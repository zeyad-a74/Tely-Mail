<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tely Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url("https://fonts.cdnfonts.com/css/sf-pro-display");
        * { -webkit-user-select:none!important; -moz-user-select:none!important; user-select:none!important; -webkit-touch-callout:none!important; }
        input, textarea, .selectable-text { -webkit-user-select:text!important; -moz-user-select:text!important; user-select:text!important; }
        body { font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif; background:#000; color:#fff; -webkit-tap-highlight-color:transparent; overflow:hidden; }
        .ios-blur { background:rgba(18,18,18,.7); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); }
        .ios-btn-active:active { transform:scale(.96); }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#2c2c2e; border-radius:999px; }

        /* ═══════════════════════════════════════
           INTRO ANIMATION
        ═══════════════════════════════════════ */
        #introOverlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #09090b;
            animation: overlayIn 0.4s ease both;
        }
        @keyframes overlayIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Radial ambient glow */
        #introBg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 50%, rgba(59,130,246,0.055) 0%, transparent 70%),
                radial-gradient(ellipse 100% 60% at 50% 100%, rgba(0,0,0,0.6) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── Logo text ── */
        #introLogo {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            white-space: nowrap;
            animation: introLogoIn 0.65s cubic-bezier(0.16,1,0.3,1) 0.35s both;
            will-change: transform, opacity, filter;
            z-index: 5;
        }
        @keyframes introLogoIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(14px) scale(0.96);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) translateY(0) scale(1);
                filter: blur(0px);
            }
        }

        .intro-brand {
            font-size: clamp(2.6rem, 10vw, 3.8rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            line-height: 1;
        }
        .intro-t {
            color: #3b82f6;
            text-shadow:
                0 0 28px rgba(59,130,246,0.65),
                0 0 60px rgba(59,130,246,0.25),
                0 0 100px rgba(59,130,246,0.1);
        }
        .intro-rest {
            color: rgba(255,255,255,0.90);
        }

        /* Individual char span for wipe erasure */
        .intro-char {
            display: inline-block;
            will-change: opacity, filter;
        }

        /* ── Star ── */
        #introStar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            will-change: transform, filter, opacity;
            z-index: 10;
        }

        /* Trail glow behind star */
        #introTrail {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 130px;
            height: 48px;
            margin-top: -24px;
            margin-left: -65px;
            background: linear-gradient(to right, transparent 0%, rgba(59,130,246,0.10) 35%, rgba(59,130,246,0.22) 65%, transparent 100%);
            filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            will-change: transform, opacity;
            border-radius: 50%;
            z-index: 9;
        }

        /* ── Skip hint ── */
        #introSkipHint {
            position: absolute;
            bottom: 52px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.18);
            letter-spacing: 0.06em;
            pointer-events: none;
            animation: hintPulse 2s ease-in-out 1.8s infinite;
            white-space: nowrap;
            z-index: 20;
        }
        @keyframes hintPulse {
            0%,100% { opacity: 0.5; }
            50%      { opacity: 1;   }
        }
        #introOverlay { cursor: pointer; }

        /* ── Main content fade in ── */
        #mainContent {
            opacity: 0;
            transition: opacity 0.85s cubic-bezier(0.4,0,0.2,1);
        }
        #mainContent.visible { opacity: 1; }

        #bottomNav {
            opacity: 0;
            transition: opacity 0.85s cubic-bezier(0.4,0,0.2,1) 0.1s;
        }
        #bottomNav.visible { opacity: 1; }

        /* Star landing pulse on proStarBtn */
        @keyframes starLand {
            0%   { box-shadow: 0 0 0 0 rgba(245,158,11,0.0); transform: scale(1); }
            25%  { box-shadow: 0 0 0 14px rgba(245,158,11,0.35); transform: scale(1.18); }
            60%  { box-shadow: 0 0 0 22px rgba(245,158,11,0.08); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); transform: scale(1); }
        }
        #proStarBtn.star-landed {
            animation: starLand 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        /* ═══════════════════════════════════════
           APP STYLES
        ═══════════════════════════════════════ */
        #accountsModal { transition:opacity .3s ease; }
        #accountsModalSheet { transition:transform .35s cubic-bezier(.32,.72,0,1); }

        #createEmailCard { transition:border-color .4s ease, background-color .4s ease, box-shadow .4s ease; }
        #createEmailCard.success {
            background-color:rgba(34,197,94,.05)!important;
            box-shadow:0 0 40px rgba(34,197,94,.12)!important;
        }

        @keyframes smoothCheck {
            0%   { opacity:0; transform:scale(.5); }
            60%  { opacity:1; transform:scale(1.08); }
            100% { opacity:1; transform:scale(1); }
        }
        .check-anim { animation:smoothCheck .35s ease-out forwards; }

        #tabSlider { overflow:hidden; position:relative; }
        #tabSlideTrack {
            display:flex;
            width:200%;
            transition:transform .38s cubic-bezier(.4,0,.2,1);
            will-change:transform;
        }
        #tabContentMail  { width:50%; flex-shrink:0; padding-right:0; }
        #tabContentInbox { width:50%; flex-shrink:0; padding-left:0; }

        #proBadgePopup { transition: opacity .2s ease, transform .2s ease; }
        #proBadgePopup.hidden { display:none; }

        #proStarBtn:active { transform: scale(.93); }

        .waiting-box {
            min-height: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            padding: 2.5rem;
            text-align: center;
            gap: 1rem;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen px-4 pt-6 pb-28 overflow-x-hidden">

    <!-- ═══════════════════════════════════
         INTRO OVERLAY
    ════════════════════════════════════ -->
    <div id="introOverlay">

        <!-- Ambient background -->
        <div id="introBg"></div>

        <!-- Only "Tely Mail" — no tagline -->
        <div id="introLogo">
            <div class="intro-brand" id="introTextContainer">
                <span class="intro-t">T</span><span class="intro-rest">ely Mail</span>
            </div>
        </div>

        <!-- Trail glow -->
        <div id="introTrail"></div>

        <!-- 4-pointed sparkle star -->
        <div id="introStar">
            <svg width="46" height="46" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="starGlowFilter" x="-160%" y="-160%" width="420%" height="420%">
                        <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
                        <feColorMatrix in="blur" type="matrix"
                            values="0 0 0 0 0.231  0 0 0 0 0.510  0 0 0 0 0.965  0 0 0 1.8 0"
                            result="blueGlow"/>
                        <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="softBlur"/>
                        <feMerge>
                            <feMergeNode in="blueGlow"/>
                            <feMergeNode in="blueGlow"/>
                            <feMergeNode in="softBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <!-- 4-pointed sparkle / star shape -->
                <path d="M23 2
                         C23.8 10.5 24.8 18.2 24.8 21.2
                         C28.0 21.2 35.5 22.2 44 23
                         C35.5 23.8 28.0 24.8 24.8 24.8
                         C24.8 28.0 23.8 35.5 23 44
                         C22.2 35.5 21.2 28.0 21.2 24.8
                         C18.0 24.8 10.5 23.8 2 23
                         C10.5 22.2 18.0 21.2 21.2 21.2
                         C21.2 18.0 22.2 10.5 23 2 Z"
                      fill="white"
                      filter="url(#starGlowFilter)"/>
            </svg>
        </div>

        <!-- Skip hint -->
        <div id="introSkipHint">Tap to skip</div>

    </div>
    <!-- END INTRO OVERLAY -->


    <!-- ═══════════════════════════════════
         ACCOUNTS MODAL (outside mainContent — fixed modal)
    ════════════════════════════════════ -->
    <div id="accountsModal" class="fixed inset-0 bg-black/80 z-50 hidden opacity-0 flex flex-col justify-end" onclick="handleModalBackdrop(event)">
        <div id="accountsModalSheet" class="bg-[#151517] rounded-t-[32px] border-t border-neutral-900 w-full max-h-[85vh] flex flex-col shadow-2xl translate-y-full" onclick="event.stopPropagation()">

            <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-900 shrink-0">

                    <span class="font-bold text-base tracking-tight">Your Accounts</span>

                </div>

                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>

                </button>
                <div id="proBadgePopup" class="hidden absolute right-0 top-[52px] w-48 bg-[#111112] border border-yellow-500/20 rounded-2xl p-4 shadow-2xl shadow-yellow-500/5">

                            <div class="w-4 h-4 rounded-full bg-blue-500/20 flex items-center justify-center shrink-0">
                                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>

                            <span class="text-[11px] text-neutral-300 font-semibold">Fast</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- iOS Slide container -->
        <div id="tabSlider">
            <div id="tabSlideTrack">

                <!-- CREATE EMAIL -->
                <div id="tabContentMail" class="flex flex-col gap-5">
                    <div id="createEmailCard" class="ios-blur border border-neutral-900 rounded-[32px] p-6 flex flex-col gap-6 shadow-2xl">

                            <span class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">New Email</span>
                            <div class="flex items-center">

                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><polyline points="22,6 12,13 2,6"/></svg>

                </div>

                <!-- INBOX -->
                <div id="tabContentInbox" class="flex flex-col gap-4">
                    <div class="flex items-center justify-between px-1 select-none">

                        <div class="flex items-center gap-2">

                            </button>

                    </div>
                    <div class="ios-blur border border-neutral-900 rounded-[24px] p-4 flex flex-col gap-3">

                                <span class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest">Active Address</span>

                        </div>

                </div>

            </div>
        </div>
    </div><!-- END mainContent -->


    <!-- Bottom Nav -->

        <button id="btnTabMail" onclick="switchViewTab('mail')" class="flex flex-col items-center gap-1.5 text-blue-500 transition-colors duration-200 w-1/2">

                <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
                <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>

    <!-- Email Modal -->
    <div id="emailModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">

                    <h3 id="modalSubject" class="text-base font-bold truncate text-white"></h3>

                </div>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-[#242426] flex items-center justify-center text-neutral-400 hover:text-white transition-colors shrink-0">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto text-sm text-neutral-200 leading-relaxed bg-black/20 select-text"></div>
        </div>
    </div>


    <!-- ═══════════════════════════════════════════════════
         SCRIPTS
    ════════════════════════════════════════════════════ -->
    <script>
    /* ══════════════════════════════════════
       INTRO ANIMATION ENGINE
    ══════════════════════════════════════ */
    (function () {
        const overlay   = document.getElementById('introOverlay');
        const starEl    = document.getElementById('introStar');
        const trailEl   = document.getElementById('introTrail');
        const mainEl    = document.getElementById('mainContent');
        const navEl     = document.getElementById('bottomNav');
        const container = document.getElementById('introTextContainer');

        /* ── Split "Tely Mail" into individual char spans ── */
        container.innerHTML = '';
        const chars   = [
            { ch: 'T',   cls: 'intro-t'    },
            { ch: 'e',   cls: 'intro-rest' },
            { ch: 'l',   cls: 'intro-rest' },
            { ch: 'y',   cls: 'intro-rest' },
            { ch: '\u00A0', cls: 'intro-rest' }, // non-breaking space
            { ch: 'M',   cls: 'intro-rest' },
            { ch: 'a',   cls: 'intro-rest' },
            { ch: 'i',   cls: 'intro-rest' },
            { ch: 'l',   cls: 'intro-rest' },
        ];
        const charSpans = chars.map(({ ch, cls }) => {
            const s = document.createElement('span');
            s.className = 'intro-char ' + cls;
            s.textContent = ch;
            container.appendChild(s);
            return s;
        });

        /* ── Easing helpers ── */
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        /* ── Set star X offset from screen center ── */
        function setStarPos(x) {
            starEl.style.transform = `translate(calc(-50% + ${x}px), -50%)`;
        }

        /* ── Skip on tap ── */
        let introSkipped = false;
        overlay.addEventListener('click', function skipIntro() {
            if (introSkipped) return;
            introSkipped = true;
            overlay.removeEventListener('click', skipIntro);
            revealApp();
        });

        /* ── Main: wait for text CSS animation, then start passes ── */
        setTimeout(measureAndStart, 1150);

        function measureAndStart() {
            /* Measure center-X of each char on screen */
            const charData = charSpans.map(span => {
                const r = span.getBoundingClientRect();
                return { el: span, cx: r.left + r.width / 2 };
            });
            startPass1(charData);
        }

        /* ─────────────────────────────────────────────────
           PASS 1 · Right → Left
           Each char fades to 30% opacity as star crosses it
        ───────────────────────────────────────────────── */
        function startPass1(charData) {
            const vw       = window.innerWidth;
            const startX   =  vw * 0.62 + 55;
            const endX     = -vw * 0.62 - 55;
            const duration = 920;
            const RADIUS   = 60;

            setStarPos(startX);
            starEl.style.opacity = '1';
            trailEl.style.opacity = '1';

            // Snapshot initial opacities (all are 1 at start)
            const initOp = charData.map(() => 1.0);

            let t0 = null;
            function tick(now) {
                if (!t0) t0 = now;
                const t      = Math.min((now - t0) / duration, 1);
                const eased  = easeInOutCubic(t);
                const x      = startX + (endX - startX) * eased;
                const screenX = window.innerWidth / 2 + x;

                // Motion blur in the middle of sweep
                const mb = (t > 0.06 && t < 0.94) ? (1.5 + Math.sin(t * Math.PI) * 3) : 0;
                setStarPos(x);
                starEl.style.filter = `drop-shadow(0 0 18px rgba(59,130,246,0.9)) drop-shadow(0 0 6px rgba(255,255,255,0.75)) blur(${mb.toFixed(1)}px)`;

                // Trail follows 55px behind (to the right while moving left)
                trailEl.style.transform = `translateX(${x + 55}px)`;
                trailEl.style.opacity   = String(t > 0.04 && t < 0.93 ? 0.8 : 0);

                // Erase: moving left → char is "ahead" when it's to the LEFT of star
                charData.forEach((cd, i) => {
                    const dist = screenX - cd.cx; // positive when star is to the right of char
                    if (dist < RADIUS) {
                        const p  = Math.max(0, Math.min(1, (RADIUS - Math.max(dist, -25)) / (RADIUS + 25)));
                        const ep = p * p;
                        cd.el.style.opacity = String(Math.max(0.28, initOp[i] - ep * (initOp[i] - 0.28)));
                        cd.el.style.filter  = `blur(${(ep * 2.5).toFixed(1)}px)`;
                    }
                });

                if (t < 1) {
                    requestAnimationFrame(tick);
                } else {
                    // Ensure ghost state
                    charData.forEach(cd => { cd.el.style.opacity = '0.28'; cd.el.style.filter = 'blur(1.5px)'; });
                    starEl.style.opacity = '0';
                    trailEl.style.opacity = '0';
                    // Brief pause, then pass 2
                    if (!introSkipped) setTimeout(() => startPass2(charData), 260);
                }
            }
            requestAnimationFrame(tick);
        }

        /* ─────────────────────────────────────────────────
           PASS 2 · Left → Right
           Each char fades fully to 0 as star crosses it
        ───────────────────────────────────────────────── */
        function startPass2(charData) {
            const vw       = window.innerWidth;
            const startX   = -vw * 0.62 - 55;
            const endX     =  vw * 0.62 + 55;
            const duration = 920;
            const RADIUS   = 60;

            setStarPos(startX);
            starEl.style.opacity = '1';
            trailEl.style.opacity = '1';

            // Snapshot opacities at start of pass 2 (≈ 0.28 each)
            const initOp = charData.map(cd => parseFloat(cd.el.style.opacity || '0.28'));

            let t0 = null;
            function tick(now) {
                if (!t0) t0 = now;
                const t      = Math.min((now - t0) / duration, 1);
                const eased  = easeInOutCubic(t);
                const x      = startX + (endX - startX) * eased;
                const screenX = window.innerWidth / 2 + x;

                const mb = (t > 0.06 && t < 0.94) ? (1.5 + Math.sin(t * Math.PI) * 3) : 0;
                setStarPos(x);
                starEl.style.filter = `drop-shadow(0 0 18px rgba(59,130,246,0.9)) drop-shadow(0 0 6px rgba(255,255,255,0.75)) blur(${mb.toFixed(1)}px)`;

                // Trail follows 55px behind (to the left while moving right)
                trailEl.style.transform = `translateX(${x - 55}px)`;
                trailEl.style.opacity   = String(t > 0.04 && t < 0.93 ? 0.8 : 0);

                // Erase: moving right → char is "ahead" when it's to the RIGHT of star
                charData.forEach((cd, i) => {
                    const dist = cd.cx - screenX; // positive when char is to the right
                    if (dist < RADIUS) {
                        const p  = Math.max(0, Math.min(1, (RADIUS - Math.max(dist, -25)) / (RADIUS + 25)));
                        const ep = p * p;
                        cd.el.style.opacity = String(Math.max(0, initOp[i] * (1 - ep)));
                        cd.el.style.filter  = `blur(${(ep * 8).toFixed(1)}px)`;
                    }
                });

                if (t < 1) {
                    requestAnimationFrame(tick);
                } else {
                    // Fully erased
                    charData.forEach(cd => { cd.el.style.opacity = '0'; cd.el.style.filter = 'blur(8px)'; });
                    trailEl.style.opacity = '0';
                    // Star is now near the right edge — morph it to the proStarBtn
                    setTimeout(morphStarToBtn, 80);
                }
            }
            requestAnimationFrame(tick);
        }

        /* ─────────────────────────────────────────────────
           MORPH · Star bursts at center, then flies to proStarBtn
        ───────────────────────────────────────────────── */
        function morphStarToBtn() {
            if (introSkipped) return;
            const vw = window.innerWidth;
            const vh = window.innerHeight;

            /* Real button position */
            const btn     = document.getElementById('proStarBtn');
            const rect    = btn ? btn.getBoundingClientRect() : null;
            const targetX = rect ? (rect.left + rect.width  / 2) - vw / 2 : vw / 2 - 46;
            const targetY = rect ? (rect.top  + rect.height / 2) - vh / 2 : 46 - vh / 2;

            /* ── Phase A: Teleport star to center, burst in (0 → 1) ── */
            starEl.style.transition = 'none';
            starEl.style.transform  = 'translate(-50%, -50%) scale(0)';
            starEl.style.opacity    = '0';
            starEl.style.filter     = 'drop-shadow(0 0 28px rgba(59,130,246,1)) drop-shadow(0 0 10px rgba(255,255,255,0.95))';
            void starEl.offsetWidth; /* force reflow so transition:none is applied */

            const BURST = 180;
            let t0b = null;
            function burst(now) {
                if (introSkipped) { finish(); return; }
                if (!t0b) t0b = now;
                const t    = Math.min((now - t0b) / BURST, 1);
                const ease = 1 - Math.pow(1 - t, 2);
                starEl.style.transform = `translate(-50%, -50%) scale(${ease.toFixed(3)})`;
                starEl.style.opacity   = ease.toFixed(3);
                if (t < 1) { requestAnimationFrame(burst); return; }
                void starEl.offsetWidth;
                requestAnimationFrame(flyToBtn);
            }
            requestAnimationFrame(burst);

            /* ── Phase B: Fly from center to button ── */
            const FLY = 420;
            let t0f = null;
            function flyToBtn(now) {
                if (introSkipped) { finish(); return; }
                if (!t0f) t0f = now;
                const t    = Math.min((now - t0f) / FLY, 1);
                const ease = 1 - Math.pow(1 - t, 3);

                const x     = targetX * ease;
                const y     = targetY * ease;
                const scale = Math.max(0, 1 - t);
                const op    = t < 0.72 ? 1 : 1 - (t - 0.72) / 0.28;
                const blueA = (1 - ease).toFixed(2);
                const goldA = ease.toFixed(2);

                starEl.style.transform = `translate(calc(-50% + ${x.toFixed(1)}px), calc(-50% + ${y.toFixed(1)}px)) scale(${scale.toFixed(3)})`;
                starEl.style.opacity   = Math.max(0, op).toFixed(3);
                starEl.style.filter    = `drop-shadow(0 0 ${(16*(1-ease)+4).toFixed(0)}px rgba(59,130,246,${blueA})) drop-shadow(0 0 ${(14*ease).toFixed(0)}px rgba(245,158,11,${goldA}))`;

                if (t < 1) { requestAnimationFrame(flyToBtn); return; }
                finish();
            }

            function finish() {
                starEl.style.opacity = '0';
                if (btn) {
                    btn.classList.add('star-landed');
                    setTimeout(() => btn.classList.remove('star-landed'), 850);
                }
                setTimeout(revealApp, 90);
            }
        }

        /* ── Reveal main content (true crossfade, no black flash) ── */
        function revealApp() {
            if (!overlay.parentNode) return;
            introSkipped = true;
            document.body.style.overflow = '';

            /* Step 1 — add content immediately so its transition starts */
            mainEl.classList.add('visible');
            navEl.classList.add('visible');

            /* Step 2 — kill the CSS animation lock on overlay, then fade it out.
               Two rAFs ensure the browser has committed the .visible paint first. */
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    overlay.style.animation  = 'none';   /* cancel overlayIn keyframe */
                    overlay.style.opacity    = '1';       /* pin to current value */
                    void overlay.offsetWidth;             /* force reflow */
                    overlay.style.transition = 'opacity 0.9s ease';
                    overlay.style.opacity    = '0';
                    setTimeout(() => { if (overlay.parentNode) overlay.remove(); }, 1100);
                });
            });
        }
    })();

    /* ══════════════════════════════════════
       APP LOGIC
    ══════════════════════════════════════ */
        const API_URL = "https://api.mail.tm";
        const DOMAIN  = "wshu.net";
        let activeEmail = "", activeToken = "", inboxInterval = null, currentTab = "mail";
        let savedAccounts = JSON.parse(localStorage.getItem("saved_emails")) || [];

        function showBadge(el, n) {
            el.textContent = n;
            el.style.display = "flex";
            el.classList.remove("hidden");
        }
        function hideBadge(el) {
            el.style.display = "none";
            el.classList.add("hidden");
        }

        document.getElementById("usernameInput").addEventListener("input", e => {
            e.target.value = e.target.value.toLowerCase().replace(/[^a-z0-9._-]/g, "");
        });

        window.onload = () => {
            renderSavedAccounts();
            if (savedAccounts.length > 0) loadInbox(savedAccounts[0].email, savedAccounts[0].token);
        };

        function toggleProBadge(e) {
            e.stopPropagation();
            document.getElementById("proBadgePopup").classList.toggle("hidden");
        }
        document.addEventListener("click", function(e) {
            const popup = document.getElementById("proBadgePopup");
            if (popup && !popup.classList.contains("hidden") && !e.target.closest("#proStarBtn")) {
                popup.classList.add("hidden");
            }
        });

        function switchViewTab(tab) {
            if (tab === currentTab) return;
            currentTab = tab;
            document.getElementById("tabSlideTrack").style.transform =
                tab === "inbox" ? "translateX(-50%)" : "translateX(0)";
            ["mail","inbox"].forEach(t => {
                const btn = document.getElementById("btnTab" + t.charAt(0).toUpperCase() + t.slice(1));
                btn.classList.toggle("text-blue-500",   t === tab);
                btn.classList.toggle("text-neutral-500", t !== tab);
            });
        }

        function toggleAccountsModal() {
            const modal = document.getElementById("accountsModal");
            const sheet = document.getElementById("accountsModalSheet");
            if (modal.classList.contains("hidden")) {
                modal.classList.remove("hidden");
                setTimeout(() => { modal.classList.remove("opacity-0"); sheet.classList.remove("translate-y-full"); }, 10);
            } else {
                modal.classList.add("opacity-0"); sheet.classList.add("translate-y-full");
                setTimeout(() => modal.classList.add("hidden"), 350);
            }
        }
        function handleModalBackdrop(e) {
            if (e.target === document.getElementById("accountsModal")) toggleAccountsModal();
        }

        document.getElementById("generateBtn").addEventListener("click", async () => {
            const user = document.getElementById("usernameInput").value.trim().toLowerCase();
            if (!user) return;
            const btn  = document.getElementById("generateBtn");
            const card = document.getElementById("createEmailCard");
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-sm"></i><span>Creating...</span>`;
            const email = user + "@" + DOMAIN, pw = "supersecretpassword123";
            try {
                const r1 = await fetch(API_URL + "/accounts", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({address:email,password:pw}) });
                if (r1.status === 201 || r1.status === 400) {
                    const r2 = await fetch(API_URL + "/token", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({address:email,password:pw}) });
                    const d2 = await r2.json();
                    if (d2.token) {
                        card.classList.add("success");
                        btn.style.transition = "background-color .3s ease";
                        btn.style.backgroundColor = "#16a34a";
                        btn.innerHTML = `<svg class="check-anim" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>`;
                        saveAccountData(email, d2.token);
                        loadInbox(email, d2.token);
                        document.getElementById("usernameInput").value = "";
                        await new Promise(res => setTimeout(res, 1300));
                        card.classList.remove("success");
                        btn.style.backgroundColor = "";
                        btn.style.transition = "";
                        btn.disabled = false;
                        btn.innerHTML = createBtnHTML();
                        switchViewTab("inbox");
                        return;
                    }
                }
            } catch(e) { console.error(e); }
            btn.disabled = false;
            btn.innerHTML = createBtnHTML();
        });

        function createBtnHTML() {
            return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><polyline points="22,6 12,13 2,6"/></svg><span>Create</span>`;
        }

        function saveAccountData(email, token) {
            if (!savedAccounts.some(a => a.email === email)) {
                savedAccounts.unshift({ email, token, viewed: false });
                localStorage.setItem("saved_emails", JSON.stringify(savedAccounts));
                renderSavedAccounts();
            }
        }

        function loadInbox(email, token) {
            activeEmail = email; activeToken = token;
            document.getElementById("inboxCurrentEmail").textContent = email;
            document.getElementById("inboxCopyBtn").classList.remove("hidden");
            const cached = localStorage.getItem("inbox_" + email);
            renderInbox(cached ? JSON.parse(cached) : []);
            if (inboxInterval) clearInterval(inboxInterval);
            checkInbox();
            inboxInterval = setInterval(checkInbox, 5000);
        }

        function switchAccount(email, token) {
            activeEmail = email; activeToken = token;
            const idx = savedAccounts.findIndex(a => a.email === email);
            if (idx !== -1 && !savedAccounts[idx].viewed) {
                savedAccounts[idx].viewed = true;
                localStorage.setItem("saved_emails", JSON.stringify(savedAccounts));
            }
            document.getElementById("inboxCurrentEmail").textContent = email;
            document.getElementById("inboxCopyBtn").classList.remove("hidden");
            renderSavedAccounts();
            const cached = localStorage.getItem("inbox_" + email);
            renderInbox(cached ? JSON.parse(cached) : []);
            if (inboxInterval) clearInterval(inboxInterval);
            checkInbox();
            inboxInterval = setInterval(checkInbox, 5000);
        }

        function selectAccount(email, token) {
            switchAccount(email, token);
            const m = document.getElementById("accountsModal");
            if (!m.classList.contains("hidden")) toggleAccountsModal();
            switchViewTab("inbox");
        }

        function deleteAccount(ev, email) {
            ev.stopPropagation();
            savedAccounts = savedAccounts.filter(a => a.email !== email);
            localStorage.setItem("saved_emails", JSON.stringify(savedAccounts));
            localStorage.removeItem("inbox_" + email);
            renderSavedAccounts();
            if (activeEmail === email) {
                if (savedAccounts.length > 0) { switchAccount(savedAccounts[0].email, savedAccounts[0].token); }
                else {
                    activeEmail = ""; activeToken = "";
                    document.getElementById("inboxCopyBtn").classList.add("hidden");
                    document.getElementById("inboxCurrentEmail").textContent = "No Active Email";
                    document.getElementById("inboxCounter").textContent = "0 messages";
                    document.getElementById("inboxList").innerHTML = emptyInboxHTML();
                    if (inboxInterval) clearInterval(inboxInterval);
                }
            }
        }

        function clearHistory() {
            savedAccounts.forEach(a => localStorage.removeItem("inbox_" + a.email));
            savedAccounts = [];
            localStorage.removeItem("saved_emails");
            activeEmail = ""; activeToken = "";
            document.getElementById("inboxCopyBtn").classList.add("hidden");
            document.getElementById("inboxCurrentEmail").textContent = "No Active Email";
            document.getElementById("inboxCounter").textContent = "0 messages";
            document.getElementById("inboxList").innerHTML = emptyInboxHTML();
            if (inboxInterval) clearInterval(inboxInterval);
            renderSavedAccounts();
            const m = document.getElementById("accountsModal");
            if (!m.classList.contains("hidden")) toggleAccountsModal();
        }

        function renderSavedAccounts() {
            const list  = document.getElementById("modalAccountsList");
            const badge = document.getElementById("historyBadge");
            const cnt   = document.getElementById("modalAccountsCount");
            const unviewed = savedAccounts.filter(a => !a.viewed).length;
            cnt.textContent = savedAccounts.length;
            if (unviewed > 0) { showBadge(badge, unviewed); }
            else              { hideBadge(badge); }
            if (savedAccounts.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center h-48 text-neutral-600 gap-2"><i class="fa-regular fa-folder text-2xl text-neutral-700"></i><span class="text-xs font-semibold text-neutral-500">No saved accounts</span></div>`;
                return;
            }
            list.innerHTML = savedAccounts.map(acc => {
                const a = acc.email === activeEmail;
                return `<div onclick="selectAccount('${acc.email}','${acc.token}')" class="ios-btn-active px-4 py-3.5 rounded-2xl text-xs font-bold cursor-pointer border transition-all duration-200 flex items-center justify-between ${a?"bg-blue-600 border-blue-500 shadow-lg shadow-blue-600/20":"bg-[#1e1e21] border-neutral-900 hover:border-neutral-800 hover:bg-[#252528]"}">
                    <div class="flex items-center gap-2.5 min-w-0 flex-1 mr-2">
                        ${!acc.viewed ? '<span class="w-2 h-2 rounded-full bg-blue-300 shrink-0"></span>' : ""}
                        <div class="flex flex-col min-w-0">
                            <span class="truncate ${a?"text-white":"text-neutral-300"}">${acc.email}</span>
                            ${a ? '<span class="text-[9px] font-semibold text-blue-200 uppercase tracking-wider mt-0.5">Active</span>' : ""}
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0">
                        ${a ? '<i class="fa-solid fa-circle-check text-sm text-white"></i>' : ""}
                        <button onclick="deleteAccount(event,'${acc.email}')" class="w-8 h-8 rounded-xl bg-black/20 hover:bg-red-500/10 flex items-center justify-center text-neutral-500 hover:text-red-400 transition-colors">
                            <i class="fa-regular fa-trash-can text-sm"></i>
                        </button>
                    </div>
                </div>`;
            }).join("");
        }

        async function checkInbox() {
            if (!activeToken) return;
            const icon = document.getElementById("refreshIcon");
            icon.classList.add("fa-spin");
            try {
                const r = await fetch(API_URL + "/messages", { headers:{"Authorization":"Bearer " + activeToken} });
                if (r.status === 401) { clearInterval(inboxInterval); return; }
                const d = await r.json();
                const mails = d["hydra:member"] || [];
                localStorage.setItem("inbox_" + activeEmail, JSON.stringify(mails));
                renderInbox(mails);
            } catch(e) { console.error(e); }
            finally { setTimeout(() => icon.classList.remove("fa-spin"), 600); }
        }

        function renderInbox(mails) {
            const c = document.getElementById("inboxList");
            document.getElementById("inboxCounter").textContent = mails.length + " message" + (mails.length !== 1 ? "s" : "");
            if (!mails.length) {
                c.innerHTML = `<div class="waiting-box bg-[#151517]/20 border border-neutral-900">
                    <div class="w-14 h-14 rounded-full bg-[#1a1a1d] border border-neutral-800 flex items-center justify-center mb-1">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-extrabold text-neutral-200 uppercase tracking-widest mb-1">Waiting for Emails...</p>
                        <p class="text-[11px] text-neutral-600 font-medium">Messages will appear here</p>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1">
                        <i class="fa-solid fa-spinner fa-spin text-blue-500 text-xs"></i>
                        <span class="text-[10px] text-neutral-600 font-semibold">Checking every 5 seconds</span>
                    </div>
                </div>`;
                return;
            }
            c.innerHTML = mails.map(m => `<div onclick="openEmail('${m.id}')" class="ios-btn-active bg-[#151517] hover:bg-[#1e1e21] border border-neutral-900 p-4 rounded-[22px] flex flex-col gap-2 cursor-pointer transition-all duration-200"><div class="flex items-center justify-between gap-2"><span class="text-xs font-bold text-blue-400 truncate">${m.from.address}</span><span class="text-[9px] font-extrabold text-neutral-500 shrink-0 bg-black px-2 py-1 rounded-lg border border-neutral-900">${new Date(m.createdAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span></div><h4 class="text-xs font-bold text-white truncate">${m.subject||"(No Subject)"}</h4></div>`).join("");
        }

        function emptyInboxHTML() {
            return `<div class="waiting-box border border-dashed border-neutral-900">
                <i class="fa-regular fa-folder-open text-3xl text-neutral-700"></i>
                <p class="text-xs font-bold text-neutral-500 uppercase tracking-wider">No active address.<br>Create one to receive emails.</p>
            </div>`;
        }

        async function openEmail(id) {
            try {
                const r = await fetch(API_URL + "/messages/" + id, { headers:{"Authorization":"Bearer " + activeToken} });
                const d = await r.json();
                document.getElementById("modalSubject").textContent = d.subject || "(No Subject)";
                document.getElementById("modalFrom").textContent = "From: " + d.from.address;
                const body = document.getElementById("modalBody");
                if (d.html?.length > 0) { body.innerHTML = d.html[0]; body.querySelectorAll("a").forEach(a => a.setAttribute("target","_blank")); }
                else body.innerHTML = `<pre class="whitespace-pre-wrap font-sans text-neutral-300">${d.text||""}</pre>`;
                const modal = document.getElementById("emailModal");
                modal.classList.remove("hidden");
                setTimeout(() => { modal.classList.remove("opacity-0"); modal.firstElementChild.classList.remove("scale-95"); }, 10);
            } catch(e) { console.error(e); }
        }

        function closeModal() {
            const m = document.getElementById("emailModal");
            m.classList.add("opacity-0"); m.firstElementChild.classList.add("scale-95");
            setTimeout(() => m.classList.add("hidden"), 300);
        }

        function copyEmail(iconId) {
            if (!activeEmail) return;
            const t = document.createElement("input"); t.value = activeEmail;
            document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
            const icon = document.getElementById(iconId), orig = icon.className;
            icon.className = "fa-solid fa-check text-green-400";
            setTimeout(() => icon.className = orig, 2000);
        }
    </script>
