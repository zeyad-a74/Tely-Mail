<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tely Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url("https://fonts.cdnfonts.com/css/sf-pro-display");
        * { -webkit-user-select:none!important; -moz-user-select:none!important; user-select:none!important; -webkit-touch-callout:none!important; }
        input, textarea, .selectable-text, #modalBody, #modalBody * { -webkit-user-select:text!important; -moz-user-select:text!important; user-select:text!important; -webkit-touch-callout:default!important; }
        body { font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif; background:#000; color:#fff; -webkit-tap-highlight-color:transparent; }
        .ios-blur { background:rgba(18,18,18,.7); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); }
        .ios-btn-active:active { transform:scale(.96); }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#2c2c2e; border-radius:999px; }
        input::selection, textarea::selection { background:rgba(59,130,246,0.25); color:#fff; }
        input::-moz-selection, textarea::-moz-selection { background:rgba(59,130,246,0.25); color:#fff; }
        input { -webkit-tap-highlight-color:transparent; caret-color:#3b82f6; }

        /* modal */
        #accountsModal { transition:opacity .3s ease; }
        #accountsModalSheet { transition:transform .35s cubic-bezier(.32,.72,0,1); }

        /* card success — NO green border on input box, only subtle glow */
        #createEmailCard { transition:border-color .4s ease, background-color .4s ease, box-shadow .4s ease; }
        #createEmailCard.success {
            background-color:rgba(34,197,94,.05)!important;
            box-shadow:0 0 40px rgba(34,197,94,.12)!important;
        }

        /* smooth check */
        @keyframes smoothCheck {
            0%   { opacity:0; transform:scale(.5); }
            60%  { opacity:1; transform:scale(1.08); }
            100% { opacity:1; transform:scale(1); }
        }
        .check-anim { animation:smoothCheck .35s ease-out forwards; }

        /* iOS push slide */
        #tabSlider { overflow:hidden; position:relative; }
        #tabSlideTrack {
            display:flex;
            width:200%;
            transition:transform .38s cubic-bezier(.4,0,.2,1);
            will-change:transform;
        }
        #tabContentMail  { width:50%; flex-shrink:0; padding-right:0; }
        #tabContentInbox { width:50%; flex-shrink:0; padding-left:0; }

        /* pro badge popup */
        #proBadgePopup {
            transition: opacity .2s ease, transform .2s ease;
        }
        #proBadgePopup.hidden { display:none; }

        /* gold star glow */
        #proStarBtn:active { transform: scale(.93); }

        /* waiting box extended */
        .waiting-box {
            min-height: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 32px;
            padding: 2.5rem;
            text-align: center;
            gap: 1rem;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen px-4 pt-6 pb-28 overflow-x-hidden">

    <!-- Accounts Bottom Sheet -->
    <div id="accountsModal" class="fixed inset-0 bg-black/80 z-50 hidden opacity-0 flex flex-col justify-end" onclick="handleModalBackdrop(event)">
        <div id="accountsModalSheet" class="bg-[#151517] rounded-t-[32px] border-t border-neutral-900 w-full max-h-[85vh] flex flex-col shadow-2xl translate-y-full" onclick="event.stopPropagation()">
            <div class="flex justify-center pt-3 pb-1 shrink-0"><div class="w-10 h-1 rounded-full bg-neutral-700"></div></div>
            <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-900 shrink-0">
                <div class="flex items-center gap-2.5">
                    <i class="fa-solid fa-clock-rotate-left text-blue-500 text-base"></i>
                    <span class="font-bold text-base tracking-tight">Your Accounts</span>
                    <span id="modalAccountsCount" class="text-[10px] text-neutral-500 font-bold bg-[#242426] px-2 py-0.5 rounded-lg border border-neutral-800">0</span>
                </div>
                <button onclick="toggleAccountsModal()" class="w-8 h-8 rounded-full bg-[#242426] flex items-center justify-center text-neutral-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
            <div id="modalAccountsList" class="flex-1 overflow-y-auto px-6 py-4 space-y-2 min-h-0"></div>
            <div class="px-6 pb-8 pt-4 border-t border-neutral-900 flex flex-col gap-3 shrink-0">
                <div class="flex items-center justify-center gap-2 py-1 text-neutral-600 text-[10px] font-bold tracking-wider uppercase">
                    <span>Made by Spider</span>
                    <svg class="w-3.5 h-3.5 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 4 4 4 20 20 4 20"></polyline></svg>
                </div>
                <button onclick="clearHistory()" class="ios-btn-active w-full bg-red-500/10 hover:bg-red-500/20 text-red-500 py-3 rounded-2xl font-bold text-xs tracking-wide transition-all flex items-center justify-center gap-2 border border-red-500/10">
                    <i class="fa-regular fa-trash-can text-sm"></i><span>Clear All History</span>
                </button>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md flex flex-col gap-6">

        <!-- Header — 3-col: hamburger | Tely Mail (center) | gold star -->
        <div class="flex items-center justify-between px-1 relative">

            <!-- Left: hamburger -->
            <button onclick="toggleAccountsModal()" class="ios-btn-active w-11 h-11 rounded-full bg-[#151517] border border-neutral-900 flex items-center justify-center text-neutral-400 hover:text-white transition-all relative z-10">
                <i class="fa-solid fa-bars-staggered text-base"></i>
                <span id="historyBadge" class="absolute -top-1.5 -right-1.5 bg-blue-600 text-white text-[9px] font-extrabold min-w-[18px] h-[18px] px-1 rounded-full items-center justify-center hidden shadow-lg shadow-blue-600/30" style="display:none">1</span>
            </button>

            <!-- Center: brand name -->
            <div class="absolute inset-x-0 flex justify-center pointer-events-none">
                <div class="flex flex-col items-center">
                    <h1 class="text-lg font-bold tracking-tight">Tely Mail</h1>
                    <p class="text-[10px] text-neutral-600 font-semibold tracking-widest">ـــــــــــــ</p>
                </div>
            </div>

            <!-- Right: gold star (Pro badge trigger) -->
            <div class="relative z-10">
                <button id="proStarBtn" onclick="toggleProBadge(event)" class="w-11 h-11 rounded-full bg-[#151517] border border-neutral-900 flex items-center justify-center transition-all hover:border-yellow-500/30 hover:bg-yellow-500/5">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                </button>

                <!-- Pro popup -->
                <div id="proBadgePopup" class="hidden absolute right-0 top-[52px] w-48 bg-[#111112] border border-yellow-500/20 rounded-2xl p-4 shadow-2xl shadow-yellow-500/5">
                    <div class="flex items-center gap-2 mb-2.5">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        <span class="text-xs font-extrabold text-yellow-400 tracking-wide">Tely Mail Pro</span>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-green-500/20 flex items-center justify-center shrink-0">
                                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                            <span class="text-[11px] text-neutral-300 font-semibold">No Ads</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-blue-500/20 flex items-center justify-center shrink-0">
                                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </div>
                            <span class="text-[11px] text-neutral-300 font-semibold">Fast</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- iOS Slide container -->
        <div id="tabSlider">
            <div id="tabSlideTrack">

                <!-- CREATE EMAIL -->
                <div id="tabContentMail" class="flex flex-col gap-5">
                    <div id="createEmailCard" class="ios-blur border border-neutral-900 rounded-[32px] p-6 flex flex-col gap-6 shadow-2xl">
                        <div class="flex flex-col bg-black border border-neutral-900 rounded-2xl focus-within:border-neutral-700 transition-colors duration-200 px-4 pt-3 pb-2 gap-1.5">
                            <span class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest">New Email</span>
                            <div class="flex items-center">
                                <input type="text" id="usernameInput"
                                    class="w-full bg-transparent pr-2 py-1.5 text-base outline-none text-white font-semibold placeholder-neutral-700 focus:ring-0"
                                    placeholder="Username">
                                <span class="text-neutral-400 font-semibold select-none tracking-wide bg-[#151517] px-3 py-1.5 rounded-xl border border-neutral-900 text-xs shrink-0">@wshu.net</span>
                            </div>
                        </div>
                        <button id="generateBtn" class="ios-btn-active bg-blue-600 hover:bg-blue-500 text-white w-full py-4 rounded-2xl font-bold text-sm tracking-wide transition-all duration-300 shadow-lg shadow-blue-600/10 flex items-center justify-center gap-2">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><polyline points="22,6 12,13 2,6"/></svg>
                            <span>Create</span>
                        </button>
                    </div>
                </div>

                <!-- INBOX -->
                <div id="tabContentInbox" class="flex flex-col gap-4">
                    <div class="flex items-center justify-between px-1 select-none">
                        <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Inbox Live Feed</span>
                        <div class="flex items-center gap-2">
                            <span id="inboxCounter" class="text-[11px] text-neutral-500 font-bold bg-[#151517] px-2.5 py-1 rounded-lg border border-neutral-900">0 messages</span>
                            <button onclick="checkInbox()" class="ios-btn-active w-9 h-9 rounded-xl bg-[#151517] border border-neutral-900 flex items-center justify-center text-blue-500 transition-colors">
                                <i id="refreshIcon" class="fa-solid fa-rotate-right text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="ios-blur border border-neutral-900 rounded-[24px] p-4 flex flex-col gap-3">
                        <div class="flex items-center justify-between gap-4">
                            <div class="flex flex-col gap-1 min-w-0 flex-1">
                                <span class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest">Active Address</span>
                                <span id="inboxCurrentEmail" class="text-sm font-bold text-blue-400 break-all">No Active Email</span>
                            </div>
                            <button id="inboxCopyBtn" onclick="copyEmail('inboxCopyIcon')" class="ios-btn-active w-10 h-10 rounded-xl bg-[#242426] hover:bg-[#2c2c2e] flex items-center justify-center text-white shrink-0 hidden">
                                <i id="inboxCopyIcon" class="fa-regular fa-copy text-sm"></i>
                            </button>
                        </div>
                    </div>
                    <div id="inboxList" class="flex flex-col gap-2.5">
                        <div class="waiting-box bg-[#151517]/20 border border-dashed border-neutral-900">
                            <i class="fa-regular fa-folder-open text-3xl text-neutral-700"></i>
                            <p class="text-xs font-bold text-neutral-500 uppercase tracking-wider">No active address. Create one to receive emails.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 h-20 bg-[#121213]/90 border-t border-neutral-900 flex justify-around items-center z-30 pb-4 backdrop-blur-xl">
        <button id="btnTabMail" onclick="switchViewTab('mail')" class="flex flex-col items-center gap-1.5 text-blue-500 transition-colors duration-200 w-1/2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <span class="text-[10px] font-extrabold tracking-wider">CREATE EMAIL</span>
        </button>
        <button id="btnTabInbox" onclick="switchViewTab('inbox')" class="flex flex-col items-center gap-1.5 text-neutral-500 transition-colors duration-200 w-1/2 relative">
            <!-- inbox tray icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
                <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
            </svg>
            <span class="text-[10px] font-extrabold tracking-wider">INBOX</span>
        </button>
    </div>

    <!-- Email Modal -->
    <div id="emailModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="ios-blur border border-neutral-900 rounded-[32px] w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="p-5 border-b border-neutral-900 flex items-center gap-3">
                <!-- SVG mail icon -->
                <div class="w-10 h-10 rounded-2xl bg-blue-500/10 border border-blue-500/15 flex items-center justify-center shrink-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </div>
                <div class="min-w-0 flex-1">
                    <h3 id="modalSubject" class="text-base font-bold truncate text-white"></h3>
                    <p id="modalFrom" class="text-xs text-neutral-500 truncate mt-0.5 font-medium"></p>
                </div>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-[#242426] flex items-center justify-center text-neutral-400 hover:text-white transition-colors shrink-0">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto text-sm text-neutral-200 leading-relaxed bg-black/20 select-text"></div>
            <!-- Copy Code bar -->
            <div id="codeBar" class="hidden px-5 py-2.5 border-t border-neutral-900 flex items-center gap-2.5 shrink-0 bg-[#0e0e10]">
                <span class="text-xs font-semibold text-neutral-500">Code:</span>
                <span id="detectedCode" class="text-sm font-extrabold text-white tracking-[0.2em] flex-1" style="font-variant-numeric:tabular-nums"></span>
                <button onclick="copyDetectedCode()" class="ios-btn-active flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-bold transition-all duration-200 text-neutral-400 hover:text-white" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)">
                    <i id="copyCodeIcon" class="fa-regular fa-copy text-[10px]"></i>
                    <span id="copyCodeText">Copy</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.mail.tm";
        const DOMAIN  = "wshu.net";
        let activeEmail = "", activeToken = "", inboxInterval = null, currentTab = "mail";
        let savedAccounts = JSON.parse(localStorage.getItem("saved_emails")) || [];

        // ── badge helpers ──────────────────────────────────────────
        function showBadge(el, n) {
            el.textContent = n;
            el.style.display = "flex";
            el.classList.remove("hidden");
        }
        function hideBadge(el) {
            el.style.display = "none";
            el.classList.add("hidden");
        }

        document.getElementById("usernameInput").addEventListener("input", e => {
            e.target.value = e.target.value.toLowerCase().replace(/[^a-z0-9._-]/g, "");
        });

        window.onload = () => {
            renderSavedAccounts();
            if (savedAccounts.length > 0) loadInbox(savedAccounts[0].email, savedAccounts[0].token);
        };

        // ── Pro badge toggle ───────────────────────────────────────
        function toggleProBadge(e) {
            e.stopPropagation();
            const popup = document.getElementById("proBadgePopup");
            popup.classList.toggle("hidden");
        }
        document.addEventListener("click", function(e) {
            const popup = document.getElementById("proBadgePopup");
            if (popup && !popup.classList.contains("hidden") && !e.target.closest("#proStarBtn")) {
                popup.classList.add("hidden");
            }
        });

        // ── iOS slide switch ───────────────────────────────────────
        function switchViewTab(tab) {
            if (tab === currentTab) return;
            currentTab = tab;
            document.getElementById("tabSlideTrack").style.transform =
                tab === "inbox" ? "translateX(-50%)" : "translateX(0)";
            ["mail","inbox"].forEach(t => {
                const btn = document.getElementById("btnTab" + t.charAt(0).toUpperCase() + t.slice(1));
                btn.classList.toggle("text-blue-500",   t === tab);
                btn.classList.toggle("text-neutral-500", t !== tab);
            });
        }

        // ── modal ──────────────────────────────────────────────────
        function toggleAccountsModal() {
            const modal = document.getElementById("accountsModal");
            const sheet = document.getElementById("accountsModalSheet");
            if (modal.classList.contains("hidden")) {
                modal.classList.remove("hidden");
                setTimeout(() => { modal.classList.remove("opacity-0"); sheet.classList.remove("translate-y-full"); }, 10);
            } else {
                modal.classList.add("opacity-0"); sheet.classList.add("translate-y-full");
                setTimeout(() => modal.classList.add("hidden"), 350);
            }
        }
        function handleModalBackdrop(e) {
            if (e.target === document.getElementById("accountsModal")) toggleAccountsModal();
        }

        // ── create email ───────────────────────────────────────────
        document.getElementById("generateBtn").addEventListener("click", async () => {
            const user = document.getElementById("usernameInput").value.trim().toLowerCase();
            if (!user) return;
            const btn  = document.getElementById("generateBtn");
            const card = document.getElementById("createEmailCard");
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-sm"></i><span>Creating...</span>`;
            const email = user + "@" + DOMAIN, pw = "supersecretpassword123";
            try {
                const r1 = await fetch(API_URL + "/accounts", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({address:email,password:pw}) });
                if (r1.status === 201 || r1.status === 400) {
                    const r2 = await fetch(API_URL + "/token", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({address:email,password:pw}) });
                    const d2 = await r2.json();
                    if (d2.token) {
                        card.classList.add("success");
                        btn.style.transition = "background-color .3s ease";
                        btn.style.backgroundColor = "#16a34a";
                        btn.innerHTML = `<svg class="check-anim" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg>`;

                        saveAccountData(email, d2.token);
                        loadInbox(email, d2.token);
                        document.getElementById("usernameInput").value = "";

                        await new Promise(res => setTimeout(res, 1300));

                        card.classList.remove("success");
                        btn.style.backgroundColor = "";
                        btn.style.transition = "";
                        btn.disabled = false;
                        btn.innerHTML = createBtnHTML();
                        switchViewTab("inbox");
                        return;
                    }
                }
            } catch(e) { console.error(e); }
            btn.disabled = false;
            btn.innerHTML = createBtnHTML();
        });

        function createBtnHTML() {
            return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><polyline points="22,6 12,13 2,6"/></svg><span>Create</span>`;
        }

        // ── account management ─────────────────────────────────────
        function saveAccountData(email, token) {
            if (!savedAccounts.some(a => a.email === email)) {
                savedAccounts.unshift({ email, token, viewed: false });
                localStorage.setItem("saved_emails", JSON.stringify(savedAccounts));
                renderSavedAccounts();
            }
        }

        function loadInbox(email, token) {
            activeEmail = email;
            activeToken = token;
            document.getElementById("inboxCurrentEmail").textContent = email;
            document.getElementById("inboxCopyBtn").classList.remove("hidden");
            const cached = localStorage.getItem("inbox_" + email);
            renderInbox(cached ? JSON.parse(cached) : []);
            if (inboxInterval) clearInterval(inboxInterval);
            checkInbox();
            inboxInterval = setInterval(checkInbox, 5000);
        }

        function switchAccount(email, token) {
            activeEmail = email;
            activeToken = token;
            const idx = savedAccounts.findIndex(a => a.email === email);
            if (idx !== -1 && !savedAccounts[idx].viewed) {
                savedAccounts[idx].viewed = true;
                localStorage.setItem("saved_emails", JSON.stringify(savedAccounts));
            }
            document.getElementById("inboxCurrentEmail").textContent = email;
            document.getElementById("inboxCopyBtn").classList.remove("hidden");
            renderSavedAccounts();
            const cached = localStorage.getItem("inbox_" + email);
            renderInbox(cached ? JSON.parse(cached) : []);
            if (inboxInterval) clearInterval(inboxInterval);
            checkInbox();
            inboxInterval = setInterval(checkInbox, 5000);
        }

        function selectAccount(email, token) {
            switchAccount(email, token);
            const m = document.getElementById("accountsModal");
            if (!m.classList.contains("hidden")) toggleAccountsModal();
            switchViewTab("inbox");
        }

        function deleteAccount(ev, email) {
            ev.stopPropagation();
            savedAccounts = savedAccounts.filter(a => a.email !== email);
            localStorage.setItem("saved_emails", JSON.stringify(savedAccounts));
            localStorage.removeItem("inbox_" + email);
            renderSavedAccounts();
            if (activeEmail === email) {
                if (savedAccounts.length > 0) { switchAccount(savedAccounts[0].email, savedAccounts[0].token); }
                else {
                    activeEmail = ""; activeToken = "";
                    document.getElementById("inboxCopyBtn").classList.add("hidden");
                    document.getElementById("inboxCurrentEmail").textContent = "No Active Email";
                    document.getElementById("inboxCounter").textContent = "0 messages";
                    document.getElementById("inboxList").innerHTML = emptyInboxHTML();
                    if (inboxInterval) clearInterval(inboxInterval);
                }
            }
        }

        function clearHistory() {
            savedAccounts.forEach(a => localStorage.removeItem("inbox_" + a.email));
            savedAccounts = [];
            localStorage.removeItem("saved_emails");
            activeEmail = ""; activeToken = "";
            document.getElementById("inboxCopyBtn").classList.add("hidden");
            document.getElementById("inboxCurrentEmail").textContent = "No Active Email";
            document.getElementById("inboxCounter").textContent = "0 messages";
            document.getElementById("inboxList").innerHTML = emptyInboxHTML();
            if (inboxInterval) clearInterval(inboxInterval);
            renderSavedAccounts();
            const m = document.getElementById("accountsModal");
            if (!m.classList.contains("hidden")) toggleAccountsModal();
        }

        function renderSavedAccounts() {
            const list  = document.getElementById("modalAccountsList");
            const badge = document.getElementById("historyBadge");
            const cnt   = document.getElementById("modalAccountsCount");
            const unviewed = savedAccounts.filter(a => !a.viewed).length;
            cnt.textContent = savedAccounts.length;
            // Badge ONLY in the sidebar (hamburger) — not in bottom nav
            if (unviewed > 0) { showBadge(badge, unviewed); }
            else              { hideBadge(badge); }
            if (savedAccounts.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center h-48 text-neutral-600 gap-2"><i class="fa-regular fa-folder text-2xl text-neutral-700"></i><span class="text-xs font-semibold text-neutral-500">No saved accounts</span></div>`;
                return;
            }
            list.innerHTML = savedAccounts.map(acc => {
                const a = acc.email === activeEmail;
                return `<div onclick="selectAccount('${acc.email}','${acc.token}')" class="ios-btn-active px-4 py-3.5 rounded-2xl text-xs font-bold cursor-pointer border transition-all duration-200 flex items-center justify-between ${a?"bg-blue-600 border-blue-500 shadow-lg shadow-blue-600/20":"bg-[#1e1e21] border-neutral-900 hover:border-neutral-800 hover:bg-[#252528]"}">
                    <div class="flex items-center gap-2.5 min-w-0 flex-1 mr-2">
                        ${!acc.viewed ? '<span class="w-2 h-2 rounded-full bg-blue-300 shrink-0"></span>' : ""}
                        <div class="flex flex-col min-w-0">
                            <span class="truncate ${a?"text-white":"text-neutral-300"}">${acc.email}</span>
                            ${a ? '<span class="text-[9px] font-semibold text-blue-200 uppercase tracking-wider mt-0.5">Active</span>' : ""}
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0">
                        ${a ? '<i class="fa-solid fa-circle-check text-sm text-white"></i>' : ""}
                        <button onclick="deleteAccount(event,'${acc.email}')" class="w-8 h-8 rounded-xl bg-black/20 hover:bg-red-500/10 flex items-center justify-center text-neutral-500 hover:text-red-400 transition-colors">
                            <i class="fa-regular fa-trash-can text-sm"></i>
                        </button>
                    </div>
                </div>`;
            }).join("");
        }

        // ── inbox ──────────────────────────────────────────────────
        async function checkInbox() {
            if (!activeToken) return;
            const icon = document.getElementById("refreshIcon");
            icon.classList.add("fa-spin");
            try {
                const r = await fetch(API_URL + "/messages", { headers:{"Authorization":"Bearer " + activeToken} });
                if (r.status === 401) { clearInterval(inboxInterval); return; }
                const d = await r.json();
                const mails = d["hydra:member"] || [];
                localStorage.setItem("inbox_" + activeEmail, JSON.stringify(mails));
                renderInbox(mails);
            } catch(e) { console.error(e); }
            finally { setTimeout(() => icon.classList.remove("fa-spin"), 600); }
        }

        function renderInbox(mails) {
            const c = document.getElementById("inboxList");
            document.getElementById("inboxCounter").textContent = mails.length + " message" + (mails.length !== 1 ? "s" : "");
            if (!mails.length) {
                c.innerHTML = `<div class="waiting-box bg-[#151517]/20 border border-neutral-900">
                    <div class="w-14 h-14 rounded-full bg-[#1a1a1d] border border-neutral-800 flex items-center justify-center mb-1">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <polyline points="22,6 12,13 2,6"/>
                            <circle cx="18" cy="18" r="4" fill="#3b82f6" stroke="none" opacity="0.15"/>
                            <path d="M18 16v2l1 1" stroke="#3b82f6" stroke-width="1.8"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs font-extrabold text-neutral-200 uppercase tracking-widest mb-1">Waiting for Emails...</p>
                        <p class="text-[11px] text-neutral-600 font-medium">Messages will appear here</p>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1">
                        <i class="fa-solid fa-spinner fa-spin text-blue-500 text-xs"></i>
                        <span class="text-[10px] text-neutral-600 font-semibold">Checking every 5 seconds</span>
                    </div>
                </div>`;
                return;
            }
            c.innerHTML = mails.map(m => `<div onclick="openEmail('${m.id}')" class="ios-btn-active bg-[#151517] hover:bg-[#1e1e21] border border-neutral-900 p-4 rounded-[22px] flex flex-col gap-2 cursor-pointer transition-all duration-200"><div class="flex items-center justify-between gap-2"><span class="text-xs font-bold text-blue-400 truncate">${m.from.address}</span><span class="text-[9px] font-extrabold text-neutral-500 shrink-0 bg-black px-2 py-1 rounded-lg border border-neutral-900">${new Date(m.createdAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span></div><h4 class="text-xs font-bold text-white truncate">${m.subject||"(No Subject)"}</h4></div>`).join("");
        }

        function emptyInboxHTML() {
            return `<div class="waiting-box border border-dashed border-neutral-900">
                <i class="fa-regular fa-folder-open text-3xl text-neutral-700"></i>
                <p class="text-xs font-bold text-neutral-500 uppercase tracking-wider">No active address.<br>Create one to receive emails.</p>
            </div>`;
        }

        async function openEmail(id) {
            try {
                const r = await fetch(API_URL + "/messages/" + id, { headers:{"Authorization":"Bearer " + activeToken} });
                const d = await r.json();
                document.getElementById("modalSubject").textContent = d.subject || "(No Subject)";
                document.getElementById("modalFrom").textContent = "From: " + d.from.address;
                const body = document.getElementById("modalBody");

                // Hide code bar initially
                document.getElementById("codeBar").classList.add("hidden");

                if (d.html?.length > 0) {
                    // Strip <style>, <script>, <link> tags to prevent bleed
                    let html = d.html[0]
                        .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, "")
                        .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, "")
                        .replace(/<link[^>]*rel=["']stylesheet["'][^>]*>/gi, "");
                    body.innerHTML = html;
                    body.querySelectorAll("a").forEach(a => a.setAttribute("target","_blank"));

                    // Fix inline styles: strip LIGHT backgrounds only, keep colored ones (red buttons etc.)
                    function colorBrightness(colorStr) {
                        if (!colorStr) return -1;
                        const c = colorStr.toLowerCase().replace(/\s/g,"");
                        // rgb/rgba
                        const m = c.match(/rgba?\((\d+),(\d+),(\d+)/);
                        if (m) return (parseInt(m[1])*299 + parseInt(m[2])*587 + parseInt(m[3])*114) / 1000;
                        // hex 3/6
                        const h3 = c.match(/^#([0-9a-f]{3})$/i);
                        if (h3) { const [,h]=h3; return colorBrightness(`rgb(${parseInt(h[0]+h[0],16)},${parseInt(h[1]+h[1],16)},${parseInt(h[2]+h[2],16)})`); }
                        const h6 = c.match(/^#([0-9a-f]{6})$/i);
                        if (h6) { const [,h]=h6; return colorBrightness(`rgb(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)})`); }
                        return -1;
                    }
                    body.querySelectorAll("*").forEach(el => {
                        const s = el.style;
                        if (s.backgroundColor) {
                            const bg = s.backgroundColor.toLowerCase().replace(/\s/g,"");
                            const bright = colorBrightness(s.backgroundColor);
                            // Remove only light/white backgrounds (brightness > 180), keep colored & dark ones
                            if (bright > 180 && !bg.includes("transparent")) {
                                s.backgroundColor = "transparent";
                            }
                        }
                        if (s.color) {
                            const col = s.color.toLowerCase().replace(/\s/g, "");
                            const bright = colorBrightness(s.color);
                            // Fix only very dark/black text colors
                            if (bright >= 0 && bright < 70) {
                                s.color = "#e5e5e5";
                            }
                        }
                        if (el.hasAttribute("bgcolor")) {
                            const bright = colorBrightness(el.getAttribute("bgcolor"));
                            if (bright > 180) el.removeAttribute("bgcolor");
                        }
                    });
                } else {
                    body.innerHTML = `<pre class="whitespace-pre-wrap font-sans text-neutral-300">${d.text||""}</pre>`;
                }

                // Auto-detect verification / OTP codes (4–8 digit numbers)
                const plainText = body.innerText || body.textContent || "";
                const codeMatch = plainText.match(/\b(\d{4,8})\b/);
                if (codeMatch) {
                    document.getElementById("detectedCode").textContent = codeMatch[1];
                    document.getElementById("codeBar").classList.remove("hidden");
                }

                const modal = document.getElementById("emailModal");
                modal.classList.remove("hidden");
                setTimeout(() => { modal.classList.remove("opacity-0"); modal.firstElementChild.classList.remove("scale-95"); }, 10);
            } catch(e) { console.error(e); }
        }

        function copyDetectedCode() {
            const code = document.getElementById("detectedCode").textContent;
            if (!code) return;
            const icon  = document.getElementById("copyCodeIcon");
            const label = document.getElementById("copyCodeText");
            const btn   = icon.closest("button");
            const doFeedback = () => {
                icon.className = "fa-solid fa-check text-[11px]";
                label.textContent = "Copied!";
                if (btn) { btn.style.background = "rgba(34,197,94,0.15)"; btn.style.borderColor = "rgba(34,197,94,0.3)"; btn.style.color = "#4ade80"; }
                setTimeout(() => {
                    icon.className = "fa-regular fa-copy text-[11px]";
                    label.textContent = "Copy";
                    if (btn) { btn.style.background = "rgba(255,255,255,0.06)"; btn.style.borderColor = "rgba(255,255,255,0.1)"; btn.style.color = "#e5e5e5"; }
                }, 2000);
            };
            if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(doFeedback).catch(() => {
                    const t = document.createElement("input"); t.value = code;
                    document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
                    doFeedback();
                });
            } else {
                const t = document.createElement("input"); t.value = code;
                document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
                doFeedback();
            }
        }

        function closeModal() {
            const m = document.getElementById("emailModal");
            m.classList.add("opacity-0"); m.firstElementChild.classList.add("scale-95");
            setTimeout(() => m.classList.add("hidden"), 300);
        }

        function copyEmail(iconId) {
            if (!activeEmail) return;
            const t = document.createElement("input"); t.value = activeEmail;
            document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
            const icon = document.getElementById(iconId), orig = icon.className;
            icon.className = "fa-solid fa-check text-green-400";
            setTimeout(() => icon.className = orig, 2000);
        }
    </script>
</body>
</html>
